version: "3.8"

services:
  app:
    build: .
    ports:
      - "3500:3500"
    depends_on:
      - db

  db:
    image: mysql:latest
    restart: always
    container_name: mydb
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3307"
    expose:
      - "3307"
    volumes:
      - my-db:/var/lib/mysql

volumes:
  my-db:
